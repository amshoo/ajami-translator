name: Verify Audio Files

on:
  push:
    paths:
      - 'audio/**'
  pull_request:
    paths:
      - 'audio/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check audio files match dictionary entries
        run: python3 .github/scripts/check_audio.py

      - name: Report coverage
        run: python3 .github/scripts/report_coverage.py
